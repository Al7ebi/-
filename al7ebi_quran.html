<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق القرآن الكريم - المصحف الكامل والمتابعة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f3f4f6; }
        .quran-text { font-family: 'Amiri', serif; line-height: 2.8; word-spacing: 5px; }
        .surah-card { background: linear-gradient(135deg, #ffffff 0%, #f9fafb 100%); }
        .hidden { display: none; }
        .loader { border-top-color: #4f46e5; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- الشاشة الرئيسية: فهرس السور والجدول -->
    <div id="home-page" class="max-w-7xl mx-auto">
        <header class="text-center mb-8">
            <h1 class="text-4xl font-bold text-indigo-950">المصحف الكريم</h1>
            <p class="text-gray-600 mt-2">فهرس جميع السور والمتابعة اليومية</p>
        </header>

        <!-- شبكة السور (جميعها بالخارج) -->
        <div id="surah-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4 mb-8">
            <!-- سيتم توليد جميع السور برمجياً هنا -->
        </div>

        <!-- جدول التتبع والتصفيير -->
        <div class="bg-white rounded-3xl shadow-lg p-6 max-w-4xl mx-auto">
            <div class="flex justify-between items-center mb-5 pb-5 border-b border-gray-100">
                <h2 class="text-xl font-bold text-indigo-900">جدول الإنجاز وتكرار السور</h2>
                <button onclick="resetTracker()" class="text-red-600 text-sm font-bold border border-red-100 px-4 py-2 rounded-full hover:bg-red-50 flex items-center gap-2">🔄 تصفير البيانات</button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-right">
                    <thead>
                        <tr class="border-b text-gray-400 text-xs uppercase tracking-wider">
                            <th class="py-3 px-2">السورة</th>
                            <th class="py-3 px-2">تم الإنجاز</th>
                            <th class="py-3 px-2 text-center">التكرار</th>
                        </tr>
                    </thead>
                    <tbody id="tracker-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- صفحة القراءة: السورة والتنقل -->
    <div id="reading-page" class="max-w-4xl mx-auto hidden bg-white min-h-screen rounded-3xl shadow-2xl p-6 relative">
        <div id="loading" class="absolute inset-0 bg-white bg-opacity-95 flex flex-col items-center justify-center z-50 hidden rounded-3xl">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-14 w-14 mb-4"></div>
            <p class="text-indigo-950 font-bold text-lg">جاري تحميل السورة...</p>
        </div>

        <!-- شريط العنوان sticky -->
        <div class="flex justify-between items-center mb-8 sticky top-0 bg-white py-3 z-10 border-b border-gray-100 rounded-t-3xl px-2">
            <button onclick="goBack()" class="text-gray-500 font-bold hover:text-gray-800 text-sm">🔙 عودة للفهرس</button>
            <h2 id="surah-title-header" class="text-3xl font-bold text-indigo-950 Amiri tracking-wide">سورة</h2>
            <div class="flex gap-2 text-xl">
                <button onclick="changeFontSize(2)" class="w-10 h-10 bg-gray-50 border rounded-xl hover:bg-gray-100">+</button>
                <button onclick="changeFontSize(-2)" class="w-10 h-10 bg-gray-50 border rounded-xl hover:bg-gray-100">-</button>
            </div>
        </div>

        <!-- نص السورة -->
        <div id="surah-content" class="quran-text text-center text-3xl text-gray-900 px-6 leading-loose"></div>

        <!-- شريط التنقل السفلي الاحترافي -->
        <div class="mt-12 pt-8 border-t border-gray-100 sticky bottom-0 bg-white py-4 flex flex-col md:flex-row justify-center gap-4 items-center rounded-b-3xl">
            <div class="flex gap-3">
                <button id="prev-surah-btn" onclick="navigateToSurah(-1)" class="w-12 h-12 bg-gray-50 border rounded-full hover:bg-indigo-50 flex items-center justify-center shadow-inner hover:shadow text-gray-600 hover:text-indigo-700">➡️</button>
                <button id="mark-btn" class="bg-green-600 text-white px-10 py-3 rounded-full font-bold text-lg shadow-xl active:scale-95 transition flex items-center gap-2 hover:bg-green-700">✅ تم الإنجاز</button>
                <button id="next-surah-btn" onclick="navigateToSurah(1)" class="w-12 h-12 bg-gray-50 border rounded-full hover:bg-indigo-50 flex items-center justify-center shadow-inner hover:shadow text-gray-600 hover:text-indigo-700">⬅️</button>
            </div>
            <p id="navigation-label" class="text-xs text-gray-400 font-mono"></p>
        </div>
    </div>

    <script>
        let currentFontSize = 32;
        let activeSurahId = null;
        let fullSurahList = []; // سيتم ملؤها بقائمة السور كاملة

        // قائمة سور جزء عم (رقم السورة واسمها)
        const juzAmmaSurahs = [
            {id: 78, name: "النبأ"}, {id: 79, name: "النازعات"}, {id: 80, name: "عبس"}, {id: 81, name: "التكوير"},
            {id: 82, name: "الإنفطار"}, {id: 83, name: "المطففين"}, {id: 84, name: "الانشقاق"}, {id: 85, name: "البروج"},
            {id: 86, name: "الطارق"}, {id: 87, name: "الأعلى"}, {id: 88, name: "الغاشية"}, {id: 89, name: "الفجر"},
            {id: 90, name: "البلد"}, {id: 91, name: "الشمس"}, {id: 92, name: "الليل"}, {id: 93, name: "الضحى"},
            {id: 94, name: "الشرح"}, {id: 95, name: "التين"}, {id: 96, name: "العلق"}, {id: 97, name: "القدر"},
            {id: 98, name: "البينة"}, {id: 99, name: "الزلزلة"}, {id: 100, name: "العاديات"}, {id: 101, name: "القارعة"},
            {id: 102, name: "التكاثر"}, {id: 103, name: "العصر"}, {id: 104, name: "الهمزة"}, {id: 105, name: "الفيل"},
            {id: 106, name: "قريش"}, {id: 107, name: "الماعون"}, {id: 108, name: "الكوثر"}, {id: 109, name: "الكافرون"},
            {id: 110, name: "النصر"}, {id: 111, name: "المسد"}, {id: 112, name: "الإخلاص"}, {id: 113, name: "الفلق"}, {id: 114, name: "الناس"}
        ];

        // قائمة السور الرئيسية الأخرى
        const otherMainSurahs = [
            {id: 1, name: "الفاتحة", type: 'main'},
            {id: 2, name: "البقرة", type: 'main'},
            {id: 18, name: "الكهف", type: 'main'}
        ];

        let trackerData = JSON.parse(localStorage.getItem('al7ebi_quran_app_data')) || {};

        // تهيئة قائمة السور الكاملة
        function initializeSurahList() {
            fullSurahList = [...otherMainSurahs, ...juzAmmaSurahs];
            const grid = document.getElementById('surah-grid');
            grid.innerHTML = "";
            fullSurahList.forEach(s => {
                grid.innerHTML += `
                    <button onclick="fetchSurah(${s.id})" class="surah-card p-5 rounded-3xl shadow-sm border border-gray-100 hover:border-indigo-100 hover:bg-indigo-50 transition text-center flex flex-col items-center gap-2 active:scale-95">
                        <span class="text-gray-300 text-xs font-mono">#${s.id}</span>
                        <span class="font-bold text-lg text-gray-800">${s.name}</span>
                        <span class="block text-2xl mt-1">${s.type === 'main' ? '📖' : '📜'}</span>
                    </button>
                `;
            });
        }

        // تحديث جدول التتبع
        function updateTrackerUI() {
            const body = document.getElementById('tracker-body');
            body.innerHTML = "";
            // فقط السور الرئيسية الثلاثة تظهر في الجدول لتسهيل العرض
            otherMainSurahs.forEach(s => {
                const name = s.name;
                if(!trackerData[name]) trackerData[name] = { done: false, count: 0 };
                body.innerHTML += `
                    <tr class="border-b border-gray-100 hover:bg-gray-50">
                        <td class="py-4 px-2 font-bold text-gray-700">${name}</td>
                        <td class="py-4 px-2"><input type="checkbox" ${trackerData[name].done ? 'checked' : ''} onclick="toggleDone('${name}')" class="w-6 h-6 accent-green-600"></td>
                        <td class="py-4 px-2 text-center">
                            <span class="bg-indigo-100 text-indigo-800 px-3 py-1 rounded-full text-xs font-bold">${trackerData[name].count}</span>
                        </td>
                    </tr>
                `;
            });
            localStorage.setItem('al7ebi_quran_app_data', JSON.stringify(trackerData));
        }

        // جلب سورة وعرضها
        async function fetchSurah(id) {
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('home-page').classList.add('hidden');
            document.getElementById('reading-page').classList.remove('hidden');
            activeSurahId = id;
            
            try {
                // جلب بيانات السورة من API
                const response = await fetch(`https://api.alquran.cloud/v1/surah/${id}`);
                const data = await response.json();
                const surah = data.data;
                const surahNameInList = fullSurahList.find(s => s.id === id).name;
                
                // تحديث العنوان Stickey
                document.getElementById('surah-title-header').innerText = `سُورَةُ ${surahNameInList}`;
                
                // تنسيق النص
                let text = surah.ayahs.map(a => `${a.text} <span class="text-indigo-400 font-sans text-xl mx-1">﴿${a.numberInSurah}﴾</span>`).join("");
                document.getElementById('surah-content').innerHTML = text;
                
                // تحديث زر "تم الإنجاز" (فقط للسور الرئيسية)
                const isMainSurah = otherMainSurahs.some(s => s.id === id);
                document.getElementById('mark-btn').style.display = isMainSurah ? 'flex' : 'none';
                if(isMainSurah) {
                    document.getElementById('mark-btn').onclick = () => finishReading(surahNameInList);
                }
                
                // تحديث التنقل
                updateNavigationUI(id);
                window.scrollTo(0,0);
            } catch (e) {
                alert("خطأ في الاتصال بالإنترنت");
            } finally {
                document.getElementById('loading').classList.add('hidden');
            }
        }

        // تحديث شريط التنقل
        function updateNavigationUI(id) {
            const currentIndex = fullSurahList.findIndex(s => s.id === id);
            const prevBtn = document.getElementById('prev-surah-btn');
            const nextBtn = document.getElementById('next-surah-btn');
            const label = document.getElementById('navigation-label');

            if(currentIndex > 0) {
                prevBtn.style.visibility = 'visible';
                prevBtn.title = `السورة السابقة: ${fullSurahList[currentIndex-1].name}`;
            } else {
                prevBtn.style.visibility = 'hidden';
            }

            if(currentIndex < fullSurahList.length - 1) {
                nextBtn.style.visibility = 'visible';
                nextBtn.title = `السورة التالية: ${fullSurahList[currentIndex+1].name}`;
            } else {
                nextBtn.style.visibility = 'hidden';
            }
            label.innerText = `السورة ${currentIndex+1} / ${fullSurahList.length}`;
        }

        // الانتقال بين السور
        function navigateToSurah(offset) {
            const currentIndex = fullSurahList.findIndex(s => s.id === activeSurahId);
            const newIndex = currentIndex + offset;
            if(newIndex >= 0 && newIndex < fullSurahList.length) {
                fetchSurah(fullSurahList[newIndex].id);
            }
        }

        // عودة للصفحة الرئيسية
        function goBack() {
            document.getElementById('home-page').classList.remove('hidden');
            document.getElementById('reading-page').classList.add('hidden');
            updateTrackerUI();
            window.scrollTo(0,0);
        }

        // تصفير البيانات
        function resetTracker() {
            if(confirm("هل أنت متأكد من تصفير جميع علامات الصح والتكرار في الجدول؟")) {
                trackerData = {};
                updateTrackerUI();
            }
        }

        // تسجيل الإنجاز
        function finishReading(name) {
            trackerData[name].done = true;
            trackerData[name].count += 1;
            localStorage.setItem('al7ebi_quran_app_data', JSON.stringify(trackerData));
            alert(`تم تسجيل إنجاز تلاوة سورة ${name} وزيادة العداد!`);
            goBack();
        }

        // تغيير حالة الصح
        function toggleDone(name) {
            trackerData[name].done = !trackerData[name].done;
            localStorage.setItem('al7ebi_quran_app_data', JSON.stringify(trackerData));
        }

        // تغيير حجم الخط
        function changeFontSize(v) {
            currentFontSize += v;
            document.getElementById('surah-content').style.fontSize = currentFontSize + 'px';
        }

        // التشغيل الأولي
        initializeSurahList();
        updateTrackerUI();
    </script>
</body>
</html>
