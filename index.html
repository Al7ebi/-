<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مصحف الحبي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f8faff; -webkit-tap-highlight-color: transparent; }
        .quran-text { font-family: 'Amiri', serif; line-height: 2.8; text-align: justify; text-align-last: center; }
        .bismillah { font-family: 'Amiri', serif; font-size: 2.2em; color: #1e1b4b; text-align: center; margin-bottom: 25px; border-bottom: 2px solid #f1f5f9; padding-bottom: 20px; }
        
        /* تنسيق السورة المكتملة */
        .surah-card.completed { background-color: #ecfdf5 !important; border-color: #10b981 !important; }
        .surah-card.completed .surah-name { color: #065f46 !important; }
        .check-mark { display: none; position: absolute; top: 5px; right: 8px; color: #10b981; font-size: 14px; }
        .surah-card.completed .check-mark { display: block; }

        .hidden { display: none; }
        .ayah-num { color: #10b981; font-weight: bold; margin: 0 4px; font-family: 'Amiri', serif; font-size: 1.1em; }
        
        .search-container { background: white; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow: hidden; }
        
        /* تصميم الأزرار الاحترافي */
        .nav-btn { background: white; border-radius: 1.5rem; border: 1px solid #f1f5f9; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); transition: all 0.2s; }
        .nav-btn:active { scale: 0.95; background-color: #f8fafc; }
    </style>
</head>
<body class="text-slate-900">

    <!-- الصفحة الرئيسية -->
    <div id="home-page" class="max-w-2xl mx-auto p-4 pb-24">
        <header class="text-center pt-16 pb-12">
            <h1 class="text-7xl font-black text-indigo-950 mb-6 drop-shadow-sm">القرآن الكريم</h1>
            <p class="text-2xl text-slate-500 font-medium opacity-90">قراءة واستماع وتصفح القرآن الكريم برواية حفص</p>
        </header>

        <!-- شريط البحث -->
        <div class="mb-10 px-2">
            <div class="search-container flex items-center p-2 border border-slate-100">
                <input type="text" id="surah-search" placeholder="ابحث في نص الآيات أو اسم السورة" 
                       class="w-full p-4 outline-none text-lg bg-transparent text-slate-600 font-medium placeholder:text-slate-300" oninput="filterSurahs()">
                <button class="bg-[#5e66f1] text-white px-10 py-4 rounded-2xl font-bold shadow-md">بحث</button>
            </div>
        </div>

        <div id="surah-grid" class="grid grid-cols-3 gap-3 px-1"></div>
    </div>

    <!-- صفحة القراءة -->
    <div id="reading-page" class="max-w-3xl mx-auto hidden bg-white min-h-screen flex flex-col shadow-2xl">
        <div class="sticky top-0 bg-white/95 backdrop-blur shadow-sm z-30 p-5 flex justify-between items-center border-b">
            <button onclick="confirmExit()" class="text-indigo-600 font-black text-lg flex items-center gap-2">
                <span>🔙</span> القائمة
            </button>
            <h2 id="header-title" class="text-2xl font-black text-indigo-950">سورة</h2>
            <div class="flex items-center gap-2 bg-slate-50 px-3 py-2 rounded-xl border">
                <button onclick="changeFontSize(-2)" class="w-8 h-8 bg-white shadow-sm rounded-lg border font-black text-xl">-</button>
                <span id="font-size-display" class="text-sm font-black text-indigo-600 w-6 text-center">32</span>
                <button onclick="changeFontSize(2)" class="w-8 h-8 bg-white shadow-sm rounded-lg border font-black text-xl">+</button>
            </div>
        </div>

        <div id="surah-container" class="flex-1 p-8">
            <div id="bismillah-area" class="bismillah">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</div>
            <div id="surah-content" class="quran-text text-slate-800 tracking-wide"></div>
        </div>

        <!-- الأزرار السفلية المحدثة -->
        <div class="sticky bottom-0 bg-white/80 backdrop-blur-md border-t p-4 flex items-center justify-between gap-3 pb-10 px-6">
            <button id="prev-btn" onclick="askBeforeNavigate(-1)" class="nav-btn flex-1 p-4 text-center">
                <span class="block text-[10px] text-slate-400 font-bold mb-1 uppercase tracking-widest">السابقة</span>
                <span id="prev-name" class="font-black text-[#5e66f1] text-lg truncate block"></span>
            </button>

            <!-- زر التصفير الاحترافي داخل السورة -->
            <button onclick="resetAll()" class="w-14 h-14 flex items-center justify-center bg-slate-50 border border-slate-100 rounded-2xl text-slate-300 hover:text-red-500 transition shadow-sm active:scale-90">
                <span class="text-2xl">🗑️</span>
            </button>

            <button id="next-btn" onclick="askBeforeNavigate(1)" class="nav-btn flex-1 p-4 text-center">
                <span class="block text-[10px] text-slate-400 font-bold mb-1 uppercase tracking-widest">التالية</span>
                <span id="next-name" class="font-black text-[#5e66f1] text-lg truncate block"></span>
            </button>
        </div>
    </div>

    <script>
        const allSurahs = [
            {id:1, name:"الفاتحة"}, {id:2, name:"البقرة"}, {id:18, name:"الكهف"},
            {id:78, name:"النبأ"}, {id:79, name:"النازعات"}, {id:80, name:"عبس"}, {id:81, name:"التكوير"},
            {id:82, name:"الإنفطار"}, {id:83, name:"المطففين"}, {id:84, name:"الانشقاق"}, {id:85, name:"البروج"},
            {id:86, name:"الطارق"}, {id:87, name:"الأعلى"}, {id:88, name:"الغاشية"}, {id:89, name:"الفجر"},
            {id:90, name:"البلد"}, {id:91, name:"الشمس"}, {id:92, name:"الليل"}, {id:93, name:"الضحى"},
            {id:94, name:"الشرح"}, {id:95, name:"التين"}, {id:96, name:"العلق"}, {id:97, name:"القدر"},
            {id:98, name:"البينة"}, {id:99, name:"الزلزلة"}, {id:100, name:"العاديات"}, {id:101, name:"القارعة"},
            {id:102, name:"التكاثر"}, {id:103, name:"العصر"}, {id:104, name:"الهمزة"}, {id:105, name:"الفيل"},
            {id:106, name:"قريش"}, {id:107, name:"الماعون"}, {id:108, name:"الكوثر"}, {id:109, name:"الكافرون"},
            {id:110, name:"النصر"}, {id:111, name:"المسد"}, {id:112, name:"الإخلاص"}, {id:113, name:"الفلق"}, {id:114, name:"الناس"}
        ];

        let completedSurahs = JSON.parse(localStorage.getItem('al7ebi_quran_done')) || [];
        let currentId = null;
        let fontSize = 32;

        function toArabicNum(n) {
            const farsiDigits = ['٠', '١', '٢', '٣', '٤', '٥', '٦', '٧', '٨', '٩'];
            return `<span class="ayah-num">﴿${n.toString().split('').map(x => farsiDigits[x]).join('')}﴾</span>`;
        }

        function init(filter = "") {
            const grid = document.getElementById('surah-grid');
            const filtered = allSurahs.filter(s => s.name.includes(filter));
            grid.innerHTML = filtered.map(s => `
                <button onclick="loadSurah(${s.id})" class="surah-card relative ${completedSurahs.includes(s.id) ? 'completed' : ''} bg-white p-5 rounded-2xl border border-slate-100 shadow-sm transition hover:shadow-md active:scale-95 text-center">
                    <span class="check-mark">✅</span>
                    <span class="surah-name block font-black text-sm text-indigo-950 truncate">${s.name}</span>
                </button>
            `).join('');
        }

        function filterSurahs() {
            init(document.getElementById('surah-search').value);
        }

        async function loadSurah(id) {
            currentId = id;
            document.getElementById('home-page').classList.add('hidden');
            document.getElementById('reading-page').classList.remove('hidden');
            window.scrollTo(0,0);
            
            const bismillahArea = document.getElementById('bismillah-area');
            if (id === 1 || id === 9) bismillahArea.classList.add('hidden');
            else bismillahArea.classList.remove('hidden');

            try {
                const res = await fetch(`https://api.alquran.cloud/v1/surah/${id}`);
                const data = await res.json();
                let ayahs = data.data.ayahs;
                document.getElementById('header-title').innerText = `سُورَةُ ${allSurahs.find(s => s.id === id).name}`;

                if (id !== 1 && id !== 9) {
                    const searchWord = "بِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ";
                    if (ayahs[0].text.includes(searchWord)) ayahs[0].text = ayahs[0].text.split(searchWord).pop().trim();
                }

                const contentDiv = document.getElementById('surah-content');
                contentDiv.style.fontSize = fontSize + 'px';
                contentDiv.innerHTML = ayahs.map(a => `${a.text} ${toArabicNum(a.numberInSurah)}`).join(' ');
                updateNav(id);
            } catch (e) { console.error(e); }
        }

        function changeFontSize(v) {
            fontSize += v;
            document.getElementById('surah-content').style.fontSize = fontSize + 'px';
            document.getElementById('font-size-display').innerText = fontSize;
        }

        function updateNav(id) {
            const idx = allSurahs.findIndex(s => s.id === id);
            const prev = allSurahs[idx-1];
            const next = allSurahs[idx+1];
            
            document.getElementById('prev-btn').style.visibility = prev ? "visible" : "hidden";
            if(prev) document.getElementById('prev-name').innerText = prev.name;
            
            document.getElementById('next-btn').style.visibility = next ? "visible" : "hidden";
            if(next) document.getElementById('next-name').innerText = next.name;
        }

        function askBeforeNavigate(step) {
            const idx = allSurahs.findIndex(s => s.id === currentId);
            if(confirm(`هل أكملت قراءة سورة ${allSurahs[idx].name}؟`)) markDone(currentId);
            const target = allSurahs[idx + step];
            if(target) loadSurah(target.id);
        }

        function confirmExit() {
            const info = allSurahs.find(s => s.id === currentId);
            if(confirm(`هل أكملت سورة ${info.name}؟`)) markDone(currentId);
            document.getElementById('home-page').classList.remove('hidden');
            document.getElementById('reading-page').classList.add('hidden');
        }

        function markDone(id) {
            if(!completedSurahs.includes(id)) {
                completedSurahs.push(id);
                localStorage.setItem('al7ebi_quran_done', JSON.stringify(completedSurahs));
                init();
            }
        }

        function resetAll() {
            if(confirm("تصفير الإنجاز ومسح العلامات؟")) {
                completedSurahs = [];
                localStorage.clear();
                init();
                document.getElementById('home-page').classList.remove('hidden');
                document.getElementById('reading-page').classList.add('hidden');
            }
        }

        init();
    </script>
</body>
</html>
