<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>مصحف الحبي</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 text-gray-800">

<!-- ================= HOME ================= -->
<div id="home-page" class="p-4">

  <!-- Header -->
  <div class="text-center mb-6">
    <h1 class="text-3xl font-bold">القرآن الكريم</h1>
    <p class="text-gray-500">مصحف الحبي</p>
  </div>

  <!-- Search -->
  <div class="flex items-center bg-white rounded-full shadow px-4 py-2 mb-4">
    <input id="search" type="text" placeholder="ابحث عن سورة..."
      class="flex-1 outline-none"
      oninput="filterSurahs()">
    <button>🔍</button>
  </div>

  <!-- Grid -->
  <div id="surah-grid" class="grid grid-cols-3 gap-3"></div>

</div>

<!-- ================= READER ================= -->
<div id="reading-page" class="hidden flex flex-col h-screen">

  <!-- Top -->
  <div class="sticky top-0 bg-white shadow p-3 flex justify-between items-center">
    <button onclick="exitReader()">⬅</button>
    <h2 id="surah-title" class="font-bold"></h2>
    <div class="flex gap-2">
      <button onclick="changeFont(2)">＋</button>
      <button onclick="changeFont(-2)">－</button>
    </div>
  </div>

  <!-- Content -->
  <div class="p-4 overflow-y-auto flex-1 text-center leading-loose">
    <div id="basmala" class="mb-4 text-lg hidden">
      بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ
    </div>
    <div id="ayahs"></div>
  </div>

  <!-- Bottom -->
  <div class="bg-white shadow p-3 flex justify-between">
    <button onclick="prevSurah()">⬅ السابق</button>
    <button onclick="resetCurrentSurah()">🗑️ حذف</button>
    <button onclick="nextSurah()">التالي ➡</button>
  </div>

</div>

<script>

// ================= STATE =================
let allSurahs = [];
let filteredSurahs = [];
let currentSurah = null;
let fontSize = 22;

const allowedSurahs = [1, 2, 18];

// ================= INIT =================
fetch('https://api.alquran.cloud/v1/surah')
  .then(res => res.json())
  .then(data => {

    allSurahs = data.data.filter(s =>
      allowedSurahs.includes(s.number) || s.number >= 78
    );

    filteredSurahs = allSurahs;
    renderSurahs(filteredSurahs);
  });

// ================= UTIL =================
function toArabicNum(num) {
  return num.toString().replace(/\d/g, d => '٠١٢٣٤٥٦٧٨٩'[d]);
}

// ================= GRID =================
function renderSurahs(list) {
  const grid = document.getElementById('surah-grid');
  const completed = getCompleted();

  grid.innerHTML = '';

  list.forEach(surah => {

    const done = completed.includes(surah.number);

    grid.innerHTML += `
      <div onclick="loadSurah(${surah.number})"
        class="bg-white p-3 rounded-xl shadow text-center cursor-pointer hover:scale-105 transition">

        <div class="font-bold">${surah.name}</div>
        <div class="text-xs text-gray-500">${surah.englishName}</div>

        ${done ? '<div class="mt-1">✅</div>' : ''}
      </div>
    `;
  });
}

// ================= SEARCH =================
function filterSurahs() {
  const val = document.getElementById('search').value.trim();

  filteredSurahs = allSurahs.filter(s =>
    s.name.includes(val) ||
    s.englishName.toLowerCase().includes(val.toLowerCase())
  );

  renderSurahs(filteredSurahs);
}

// ================= LOAD =================
function loadSurah(id) {
  fetch(`https://api.alquran.cloud/v1/surah/${id}`)
    .then(res => res.json())
    .then(data => {

      currentSurah = id;

      let ayahs = data.data.ayahs;
      const ayahContainer = document.getElementById('ayahs');
      const basmala = document.getElementById('basmala');

      // Show basmala only if needed
      if (id !== 1 && id !== 9) {
        basmala.classList.remove('hidden');
        ayahs[0].text = ayahs[0].text.replace(/^بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ/, '');
      } else {
        basmala.classList.add('hidden');
      }

      document.getElementById('surah-title').innerText = data.data.name;

      ayahContainer.innerHTML = '';

      ayahs.forEach(a => {
        ayahContainer.innerHTML += `
          <span> ${a.text} ﴿${toArabicNum(a.numberInSurah)}﴾ </span>
        `;
      });

      ayahContainer.style.fontSize = fontSize + 'px';

      togglePages();
    });
}

// ================= FONT =================
function changeFont(val) {
  fontSize = Math.max(16, fontSize + val);
  document.getElementById('ayahs').style.fontSize = fontSize + 'px';
}

// ================= NAV =================
function nextSurah() {
  const index = allSurahs.findIndex(s => s.number === currentSurah);
  if (index < allSurahs.length - 1) {
    loadSurah(allSurahs[index + 1].number);
  }
}

function prevSurah() {
  const index = allSurahs.findIndex(s => s.number === currentSurah);
  if (index > 0) {
    loadSurah(allSurahs[index - 1].number);
  }
}

// ================= STORAGE =================
function getCompleted() {
  return JSON.parse(localStorage.getItem('completedSurahs') || '[]');
}

function exitReader() {
  let completed = getCompleted();

  if (!completed.includes(currentSurah)) {
    completed.push(currentSurah);
  }

  localStorage.setItem('completedSurahs', JSON.stringify(completed));

  togglePages();
  renderSurahs(filteredSurahs);
}

function resetCurrentSurah() {
  let completed = getCompleted();

  completed = completed.filter(id => id !== currentSurah);

  localStorage.setItem('completedSurahs', JSON.stringify(completed));

  renderSurahs(filteredSurahs);
}

// ================= UI =================
function togglePages() {
  document.getElementById('home-page').classList.toggle('hidden');
  document.getElementById('reading-page').classList.toggle('hidden');
}

</script>

</body>
</html>
