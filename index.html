<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>مصحف الحبي</title>

    <!-- التقنيات المستخدمة: Tailwind و Google Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Cairo:wght@400;900&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Cairo', sans-serif; background: #f8faff; scroll-behavior: smooth; }
        .quran-text { font-family: 'Amiri', serif; line-height: 2.8; text-align: justify; text-align-last: center; }
        .ayah-num { color: #10b981; font-weight: bold; margin: 0 4px; }
        .bismillah { font-family: 'Amiri'; font-size: 2.5em; text-align: center; margin-bottom: 20px; color: #1e1b4b; }
        /* تحسين مظهر شريط التمرير */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>

<body class="text-slate-900">

<!-- ================= الصفحة الرئيسية ================= -->
<div id="home-page" class="max-w-2xl mx-auto p-4 pb-24">
    <header class="text-center pt-12 pb-8">
        <h1 class="text-6xl font-black text-indigo-950 mb-2">القرآن الكريم</h1>
        <p class="text-xl text-slate-500 font-medium">مصحف الحبي</p>
    </header>

    <!-- شريط البحث الاحترافي -->
    <div class="mb-8 px-2">
        <div class="flex items-center bg-white rounded-full p-2 shadow-sm border border-slate-100 focus-within:border-indigo-300 transition-all">
            <span class="bg-indigo-600 text-white w-10 h-10 flex items-center justify-center rounded-full ml-3 shadow-md">🔍</span>
            <input id="search" type="text" placeholder="ابحث عن سورة..." 
                   class="flex-1 outline-none text-lg bg-transparent" 
                   oninput="filterSurahs()">
        </div>
    </div>

    <!-- شبكة السور -->
    <div id="surah-grid" class="grid grid-cols-3 gap-4"></div>
</div>

<!-- ================= صفحة القراءة ================= -->
<div id="reading-page" class="hidden fixed inset-0 bg-white flex flex-col z-50">
    <!-- الشريط العلوي الثابت -->
    <div class="sticky top-0 bg-white/95 backdrop-blur shadow-sm p-4 flex justify-between items-center border-b border-slate-100">
        <button onclick="exitReader()" class="text-indigo-600 font-black text-lg hover:bg-indigo-50 px-3 py-1 rounded-lg transition">🔙 خروج</button>
        <h2 id="surah-title" class="text-2xl font-black text-indigo-950"></h2>
        <div class="flex items-center gap-2 bg-slate-50 p-1 rounded-xl border border-slate-100">
            <button onclick="changeFont(-2)" class="w-10 h-10 bg-white border rounded-lg font-bold shadow-sm active:bg-slate-100">－</button>
            <button onclick="changeFont(2)" class="w-10 h-10 bg-white border rounded-lg font-bold shadow-sm active:bg-slate-100">＋</button>
        </div>
    </div>

    <!-- منطقة النص القرآني -->
    <div id="scroll-container" class="p-6 overflow-y-auto flex-1">
        <div id="basmala" class="bismillah hidden">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</div>
        <div id="ayahs" class="quran-text text-slate-800"></div>
    </div>

    <!-- شريط التحكم السفلي -->
    <div class="bg-white border-t p-4 flex justify-between gap-3 shadow-[0_-4px_20px_rgba(0,0,0,0.05)]">
        <button onclick="prevSurah()" class="flex-1 p-4 bg-slate-100 hover:bg-slate-200 rounded-2xl font-bold text-indigo-600 transition">السابق</button>
        <button onclick="resetCurrentSurah()" class="w-14 h-14 flex items-center justify-center bg-red-50 hover:bg-red-100 rounded-2xl text-red-500 border border-red-100 transition">🗑️</button>
        <button onclick="nextSurah()" class="flex-1 p-4 bg-indigo-600 hover:bg-indigo-700 rounded-2xl font-bold text-white shadow-lg shadow-indigo-200 transition">التالي</button>
    </div>
</div>

<script>
// ================= المتغيرات الأساسية =================
let allSurahs = [], filteredSurahs = [], currentSurah = null, fontSize = 32;
const allowedSurahs = [1, 2, 18]; // السور المحددة بالإضافة لجزء عم

// ================= التشغيل الأولي =================
fetch('https://api.alquran.cloud/v1/surah')
    .then(r => r.json())
    .then(data => {
        allSurahs = data.data.filter(s => allowedSurahs.includes(s.number) || s.number >= 78);
        filteredSurahs = allSurahs;
        renderSurahs(filteredSurahs);
    })
    .catch(err => alert("تأكد من اتصالك بالإنترنت لتحميل السور"));

// ================= وظائف الأدوات =================
function toArabicNum(n) {
    const d = ['٠','١','٢','٣','٤','٥','٦','٧','٨','٩'];
    return `<span class="ayah-num">﴿${n.toString().split('').map(x => d[x]).join('')}﴾</span>`;
}

// ================= عرض شبكة السور =================
function renderSurahs(list) {
    const grid = document.getElementById('surah-grid');
    const completed = JSON.parse(localStorage.getItem('completedSurahs') || '[]');
    
    grid.innerHTML = list.map(s => `
        <div onclick="loadSurah(${s.number})" 
             class="relative bg-white p-5 rounded-2xl border border-slate-100 shadow-sm text-center cursor-pointer hover:shadow-md hover:border-indigo-200 active:scale-95 transition-all ${completed.includes(s.number) ? 'bg-emerald-50/50 border-emerald-100' : ''}">
            <div class="font-black text-indigo-950">${s.name}</div>
            ${completed.includes(s.number) ? '<div class="absolute top-2 right-2 text-[10px] bg-emerald-500 text-white px-1.5 py-0.5 rounded-full font-bold shadow-sm">✅</div>' : ''}
        </div>
    `).join('');
}

// ================= البحث =================
function filterSurahs() {
    const val = document.getElementById('search').value.trim();
    filteredSurahs = allSurahs.filter(s => s.name.includes(val));
    renderSurahs(filteredSurahs);
}

// ================= تحميل السورة والقراءة =================
function loadSurah(id) {
    const ayahsEl = document.getElementById('ayahs');
    const basmalaEl = document.getElementById('basmala');
    const container = document.getElementById('scroll-container');
    
    container.scrollTop = 0; // العودة للأعلى
    ayahsEl.innerHTML = `<div class="py-20 text-slate-400 animate-pulse text-center">جاري تحميل كلام الله...</div>`;

    fetch(`https://api.alquran.cloud/v1/surah/${id}`)
    .then(r => r.json())
    .then(data => {
        currentSurah = id;
        let ayahs = data.data.ayahs;

        // معالجة البسملة باحترافية (Regex يتجاهل التشكيل)
        if (id !== 1 && id !== 9) {
            basmalaEl.classList.remove('hidden');
            const pattern = /^بِسْمِ\s+ٱللَّهِ\s+ٱلرَّحْمَٰنِ\s+ٱلرَّحِيمِ/g;
            ayahs[0].text = ayahs[0].text.replace(pattern, "").trim();
        } else {
            basmalaEl.classList.add('hidden');
        }

        document.getElementById('surah-title').innerText = `سورة ${data.data.name}`;
        ayahsEl.innerHTML = ayahs.map(a => `${a.text} ${toArabicNum(a.numberInSurah)}`).join(' ');
        ayahsEl.style.fontSize = fontSize + 'px';
        
        document.getElementById('home-page').classList.add('hidden');
        document.getElementById('reading-page').classList.remove('hidden');
    });
}

// ================= التحكم في الخط =================
function changeFont(v) {
    fontSize = Math.max(20, fontSize + v);
    document.getElementById('ayahs').style.fontSize = fontSize + 'px';
}

// ================= التنقل والحفظ =================
function exitReader() {
    let completed = JSON.parse(localStorage.getItem('completedSurahs') || '[]');
    if (!completed.includes(currentSurah)) completed.push(currentSurah);
    localStorage.setItem('completedSurahs', JSON.stringify(completed));
    
    document.getElementById('home-page').classList.remove('hidden');
    document.getElementById('reading-page').classList.add('hidden');
    renderSurahs(filteredSurahs);
}

function resetCurrentSurah() {
    if(confirm("هل تريد حذف إنجاز هذه السورة فقط من القائمة؟")) {
        let completed = JSON.parse(localStorage.getItem('completedSurahs') || '[]');
        completed = completed.filter(id => id !== currentSurah);
        localStorage.setItem('completedSurahs', JSON.stringify(completed));
        
        document.getElementById('home-page').classList.remove('hidden');
        document.getElementById('reading-page').classList.add('hidden');
        renderSurahs(filteredSurahs);
    }
}

function nextSurah() {
    const idx = allSurahs.findIndex(s => s.number === currentSurah);
    if (idx < allSurahs.length - 1) loadSurah(allSurahs[idx + 1].number);
}

function prevSurah() {
    const idx = allSurahs.findIndex(s => s.number === currentSurah);
    if (idx > 0) loadSurah(allSurahs[idx - 1].number);
}
</script>
</body>
</html>
