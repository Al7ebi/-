<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مصحف الحبي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f8faff; -webkit-tap-highlight-color: transparent; }
        .quran-text { font-family: 'Amiri', serif; line-height: 3; text-align: justify; text-align-last: center; }
        .bismillah { font-family: 'Amiri', serif; font-size: 2.8em; color: #1e1b4b; text-align: center; margin: 20px 0; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        
        .surah-card.completed { background-color: #ecfdf5 !important; border-color: #10b981 !important; }
        .check-mark { display: none; position: absolute; top: 8px; right: 10px; color: #10b981; font-size: 16px; }
        .surah-card.completed .check-mark { display: block; }

        .hidden { display: none; }
        .ayah-num { color: #10b981; font-weight: bold; margin: 0 8px; font-family: 'Amiri', serif; font-size: 1.2em; }
        
        .search-container { background: white; border-radius: 999px; display: flex; align-items: center; padding: 6px; border: 1px solid #e2e8f0; }
        .search-icon { background: #4f46e5; color: white; padding: 12px; border-radius: 999px; margin-left: 10px; }
    </style>
</head>
<body class="text-slate-900">

    <!-- الصفحة الرئيسية -->
    <div id="home-page" class="max-w-2xl mx-auto p-4 pb-24">
        <header class="text-center pt-16 pb-12">
            <h1 class="text-7xl font-black text-indigo-950 mb-4 tracking-tighter">القرآن الكريم</h1>
            <p class="text-xl text-slate-500 font-medium">مصحف الحبي</p>
        </header>

        <div class="mb-10 px-2">
            <div class="search-container shadow-sm">
                <div class="search-icon">🔍</div>
                <input type="text" id="surah-search" placeholder="ابحث عن سورة..." 
                       class="w-full p-2 outline-none text-lg font-bold text-slate-700 bg-transparent" oninput="filterSurahs()">
            </div>
        </div>

        <div id="surah-grid" class="grid grid-cols-3 gap-3 px-1"></div>
    </div>

    <!-- صفحة القراءة -->
    <div id="reading-page" class="max-w-4xl mx-auto hidden bg-white min-h-screen flex flex-col shadow-2xl">
        <div class="sticky top-0 bg-white/95 backdrop-blur z-50 p-5 flex justify-between items-center border-b">
            <button onclick="exitReader()" class="text-indigo-600 font-black text-xl">🔙 خروج</button>
            <h2 id="header-title" class="text-2xl font-black text-indigo-950"></h2>
            <div class="flex items-center gap-3 bg-slate-50 p-1 rounded-xl border">
                <button onclick="changeFontSize(-2)" class="w-10 h-10 bg-white border rounded-lg font-black">-</button>
                <span id="font-size-display" class="font-bold text-indigo-600 min-w-[30px] text-center text-lg">32</span>
                <button onclick="changeFontSize(2)" class="w-10 h-10 bg-white border rounded-lg font-black">+</button>
            </div>
        </div>

        <div id="surah-container" class="flex-1 p-8 pb-32">
            <div id="bismillah-area" class="bismillah">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</div>
            <div id="surah-content" class="quran-text text-slate-800"></div>
        </div>

        <!-- الأزرار السفلية -->
        <div class="sticky bottom-0 bg-white border-t p-6 flex items-center justify-between gap-4">
            <button id="prev-btn" onclick="navigateSurah(-1)" class="flex-1 p-4 bg-slate-50 rounded-2xl text-center border font-bold text-indigo-600 border-slate-200"></button>
            
            <!-- زر الحذف المحدث: يحذف السورة الحالية فقط -->
            <button onclick="resetCurrentSurah()" class="w-14 h-14 flex items-center justify-center bg-red-50 border border-red-100 rounded-2xl text-red-500 shadow-sm active:scale-90">
                <span class="text-2xl">🗑️</span>
            </button>

            <button id="next-btn" onclick="navigateSurah(1)" class="flex-1 p-4 bg-indigo-600 rounded-2xl text-center font-bold text-white shadow-lg"></button>
        </div>
    </div>

    <script>
        const allSurahs = [
            {id:1, name:"الفاتحة"}, {id:2, name:"البقرة"}, {id:78, name:"النبأ"}, {id:79, name:"النازعات"}, 
            {id:80, name:"عبس"}, {id:81, name:"التكوير"}, {id:82, name:"الانفطار"}, {id:83, name:"المطففين"},
            {id:84, name:"الانشقاق"}, {id:85, name:"البروج"}, {id:112, name:"الإخلاص"}, {id:114, name:"الناس"}
        ];

        let completedSurahs = JSON.parse(localStorage.getItem('al7ebi_quran_done')) || [];
        let currentId = null;
        let fontSize = 32;

        function toArabicNum(n) {
            const digits = ['٠', '١', '٢', '٣', '٤', '٥', '٦', '٧', '٨', '٩'];
            return `<span class="ayah-num">﴿${n.toString().split('').map(x => digits[x]).join('')}﴾</span>`;
        }

        async function loadSurah(id) {
            currentId = id;
            document.getElementById('home-page').classList.add('hidden');
            document.getElementById('reading-page').classList.remove('hidden');
            window.scrollTo(0,0);
            
            const bArea = document.getElementById('bismillah-area');
            (id === 1 || id === 9) ? bArea.classList.add('hidden') : bArea.classList.remove('hidden');

            try {
                const res = await fetch(`https://api.alquran.cloud/v1/surah/${id}`);
                const data = await res.json();
                let ayahs = data.data.ayahs;
                document.getElementById('header-title').innerText = `سُورَةُ ${allSurahs.find(s => s.id === id).name}`;

                if (id !== 1 && id !== 9) {
                    const pattern = /^بِسْمِ\s*ٱللَّهِ\s*ٱلرَّحْمَٰنِ\s*ٱلرَّحِيمِ/g;
                    ayahs[0].text = ayahs[0].text.replace(pattern, "").trim();
                }

                document.getElementById('surah-content').innerHTML = ayahs.map(a => `${a.text} ${toArabicNum(a.numberInSurah)}`).join(' ');
                document.getElementById('surah-content').style.fontSize = fontSize + 'px';
                updateNav(id);
            } catch (e) { console.error(e); }
        }

        function init() {
            const grid = document.getElementById('surah-grid');
            grid.innerHTML = allSurahs.map(s => `
                <button onclick="loadSurah(${s.id})" class="surah-card relative ${completedSurahs.includes(s.id) ? 'completed' : ''} bg-white p-6 rounded-3xl border border-slate-100 shadow-sm text-center">
                    <span class="check-mark">✅</span>
                    <span class="surah-name block font-black text-indigo-950">${s.name}</span>
                </button>
            `).join('');
        }

        function changeFontSize(v) {
            fontSize += v;
            document.getElementById('surah-content').style.fontSize = fontSize + 'px';
            document.getElementById('font-size-display').innerText = fontSize;
        }

        function updateNav(id) {
            const idx = allSurahs.findIndex(s => s.id === id);
            const prev = allSurahs[idx-1], next = allSurahs[idx+1];
            const pBtn = document.getElementById('prev-btn'), nBtn = document.getElementById('next-btn');
            
            if(prev) { pBtn.innerText = "السابقة: " + prev.name; pBtn.style.visibility = "visible"; }
            else pBtn.style.visibility = "hidden";

            if(next) { nBtn.innerText = "التالية: " + next.name; nBtn.style.visibility = "visible"; }
            else nBtn.style.visibility = "hidden";
        }

        function navigateSurah(step) {
            const idx = allSurahs.findIndex(s => s.id === currentId);
            if(allSurahs[idx+step]) loadSurah(allSurahs[idx+step].id);
        }

        function exitReader() {
            if(!completedSurahs.includes(currentId)) {
                completedSurahs.push(currentId);
                localStorage.setItem('al7ebi_quran_done', JSON.stringify(completedSurahs));
            }
            document.getElementById('home-page').classList.remove('hidden');
            document.getElementById('reading-page').classList.add('hidden');
            init();
        }

        // الوظيفة المطلوبة: حذف السورة الحالية فقط
        function resetCurrentSurah() {
            const currentName = allSurahs.find(s => s.id === currentId).name;
            if(confirm(`هل تريد مسح علامة الإنجاز لسورة ${currentName} فقط؟`)) {
                completedSurahs = completedSurahs.filter(id => id !== currentId);
                localStorage.setItem('al7ebi_quran_done', JSON.stringify(completedSurahs));
                alert(`تم مسح إنجاز سورة ${currentName}`);
            }
        }

        function filterSurahs() {
            const term = document.getElementById('surah-search').value;
            const grid = document.getElementById('surah-grid');
            const filtered = allSurahs.filter(s => s.name.includes(term));
            grid.innerHTML = filtered.map(s => `
                <button onclick="loadSurah(${s.id})" class="surah-card relative ${completedSurahs.includes(s.id) ? 'completed' : ''} bg-white p-6 rounded-3xl border border-slate-100 shadow-sm text-center">
                    <span class="check-mark">✅</span>
                    <span class="surah-name block font-black text-indigo-950">${s.name}</span>
                </button>
            `).join('');
        }

        init();
    </script>
</body>
</html>
