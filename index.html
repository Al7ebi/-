<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مصحف الحبي - تحديث البسملة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #fcfcfc; -webkit-tap-highlight-color: transparent; }
        .quran-text { font-family: 'Amiri', serif; line-height: 2.8; }
        .bismillah { font-family: 'Amiri', serif; font-size: 1.8em; color: #1e1b4b; text-align: center; margin-bottom: 20px; display: block; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        .surah-card.completed { background-color: #d1fae5 !important; border-color: #10b981 !important; }
        .surah-card.completed .surah-name { color: #065f46 !important; }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-gray-50">

    <!-- الصفحة الرئيسية -->
    <div id="home-page" class="max-w-xl mx-auto p-4 pb-20">
        <header class="text-center py-8">
            <h1 class="text-3xl font-bold text-slate-900">المصحف الكريم</h1>
            <p class="text-slate-500 text-xs mt-2">3 أعمدة - تتبع الإنجاز</p>
        </header>

        <div id="surah-grid" class="grid grid-cols-3 gap-2">
            <!-- السور هنا -->
        </div>
        
        <div class="text-center mt-10">
            <button onclick="resetAll()" class="text-[10px] text-gray-400 underline">تصفير الإنجاز 🔄</button>
        </div>
    </div>

    <!-- صفحة القراءة -->
    <div id="reading-page" class="max-w-2xl mx-auto hidden bg-white min-h-screen flex flex-col shadow-lg">
        <div class="sticky top-0 bg-white shadow-sm z-30 p-4 flex justify-between items-center border-b">
            <button onclick="confirmExit()" class="text-indigo-600 font-bold text-sm">🔙 خروج</button>
            <h2 id="header-title" class="text-lg font-bold text-indigo-950">سورة</h2>
            
            <div class="flex items-center gap-2 bg-gray-50 px-2 py-1 rounded-lg border">
                <button onclick="changeFontSize(-2)" class="w-7 h-7 bg-white shadow-sm rounded border font-bold">-</button>
                <span id="font-size-display" class="text-xs font-bold text-indigo-600 w-6 text-center">30</span>
                <button onclick="changeFontSize(2)" class="w-7 h-7 bg-white shadow-sm rounded border font-bold">+</button>
            </div>
        </div>

        <div id="surah-container" class="flex-1 p-6 text-center">
            <div id="bismillah-area" class="bismillah">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</div>
            <div id="surah-content" class="quran-text text-gray-800"></div>
        </div>

        <div class="sticky bottom-0 bg-gray-50 border-t p-4 grid grid-cols-2 gap-3 pb-8">
            <button id="prev-btn" onclick="askBeforeNavigate(-1)" class="bg-white border rounded-xl p-2 shadow-sm text-center">
                <span class="block text-[9px] text-gray-400">السابقة</span>
                <span id="prev-name" class="font-bold text-indigo-700 text-[11px] truncate"></span>
            </button>
            <button id="next-btn" onclick="askBeforeNavigate(1)" class="bg-white border rounded-xl p-2 shadow-sm text-center">
                <span class="block text-[9px] text-gray-400">التالية</span>
                <span id="next-name" class="font-bold text-indigo-700 text-[11px] truncate"></span>
            </button>
        </div>
    </div>

    <script>
        const allSurahs = [
            {id:1, name:"الفاتحة"}, {id:2, name:"البقرة"}, {id:18, name:"الكهف"},
            {id:78, name:"النبأ"}, {id:79, name:"النازعات"}, {id:80, name:"عبس"}, {id:81, name:"التكوير"},
            {id:82, name:"الإنفطار"}, {id:83, name:"المطففين"}, {id:84, name:"الانشقاق"}, {id:85, name:"البروج"},
            {id:86, name:"الطارق"}, {id:87, name:"الأعلى"}, {id:88, name:"الغاشية"}, {id:89, name:"الفجر"},
            {id:90, name:"البلد"}, {id:91, name:"الشمس"}, {id:92, name:"الليل"}, {id:93, name:"الضحى"},
            {id:94, name:"الشرح"}, {id:95, name:"التين"}, {id:96, name:"العلق"}, {id:97, name:"القدر"},
            {id:98, name:"البينة"}, {id:99, name:"الزلزلة"}, {id:100, name:"العاديات"}, {id:101, name:"القارعة"},
            {id:102, name:"التكاثر"}, {id:103, name:"العصر"}, {id:104, name:"الهمزة"}, {id:105, name:"الفيل"},
            {id:106, name:"قريش"}, {id:107, name:"الماعون"}, {id:108, name:"الكوثر"}, {id:109, name:"الكافرون"},
            {id:110, name:"النصر"}, {id:111, name:"المسد"}, {id:112, name:"الإخلاص"}, {id:113, name:"الفلق"}, {id:114, name:"الناس"}
        ];

        let completedSurahs = JSON.parse(localStorage.getItem('al7ebi_quran_done')) || [];
        let currentId = null;
        let fontSize = 30;

        function init() {
            const grid = document.getElementById('surah-grid');
            grid.innerHTML = allSurahs.map(s => `
                <button onclick="loadSurah(${s.id})" class="surah-card ${completedSurahs.includes(s.id) ? 'completed' : ''} bg-white p-3 rounded-xl border shadow-sm transition active:scale-90">
                    <span class="surah-name block font-bold text-[13px] text-indigo-900 truncate">${s.name}</span>
                </button>
            `).join('');
        }

        async function loadSurah(id) {
            currentId = id;
            document.getElementById('home-page').classList.add('hidden');
            document.getElementById('reading-page').classList.remove('hidden');
            window.scrollTo(0,0);
            
            const bismillahArea = document.getElementById('bismillah-area');
            if (id === 1 || id === 9) bismillahArea.classList.add('hidden');
            else bismillahArea.classList.remove('hidden');

            try {
                const res = await fetch(`https://api.alquran.cloud/v1/surah/${id}`);
                const data = await res.json();
                let ayahs = data.data.ayahs;
                const info = allSurahs.find(s => s.id === id);
                document.getElementById('header-title').innerText = `سُورَةُ ${info.name}`;

                // --- خوارزمية تنظيف البسملة المكررة الجديدة ---
                if (id !== 1 && id !== 9) {
                    let firstAyah = ayahs[0].text;
                    // البحث عن كلمة "بِسْمِ" ومشتقاتها وحذفها مع ما يليها حتى نهاية جملة البسملة
                    const searchWord = "بِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ";
                    if (firstAyah.includes(searchWord)) {
                        ayahs[0].text = firstAyah.split(searchWord).pop().trim();
                    } else if (firstAyah.startsWith("بِسْمِ")) {
                        // حل احتياطي في حال اختلاف التشكيل: حذف أول 30 حرف (طول البسملة تقريباً)
                        ayahs[0].text = firstAyah.substring(firstAyah.indexOf("الرَّحِيمِ") + 10).trim();
                    }
                }

                const contentDiv = document.getElementById('surah-content');
                contentDiv.style.fontSize = fontSize + 'px';
                contentDiv.innerHTML = ayahs.map(a => 
                    `${a.text} <span class="text-indigo-300 mx-1">﴿${a.numberInSurah}﴾</span>`
                ).join(' ');

                updateNav(id);
            } catch (e) { console.error(e); }
        }

        function changeFontSize(v) {
            fontSize += v;
            document.getElementById('surah-content').style.fontSize = fontSize + 'px';
            document.getElementById('font-size-display').innerText = fontSize;
        }

        function updateNav(id) {
            const idx = allSurahs.findIndex(s => s.id === id);
            const prev = allSurahs[idx-1];
            const next = allSurahs[idx+1];
            document.getElementById('prev-btn').style.visibility = prev ? "visible" : "hidden";
            document.getElementById('prev-name').innerText = prev ? prev.name : "";
            document.getElementById('next-btn').style.visibility = next ? "visible" : "hidden";
            document.getElementById('next-name').innerText = next ? next.name : "";
        }

        function askBeforeNavigate(step) {
            const idx = allSurahs.findIndex(s => s.id === currentId);
            if(confirm(`هل أكملت قراءة سورة ${allSurahs[idx].name}؟`)) markDone(currentId);
            const target = allSurahs[idx + step];
            if(target) loadSurah(target.id);
        }

        function confirmExit() {
            const info = allSurahs.find(s => s.id === currentId);
            if(confirm(`هل أكملت سورة ${info.name}؟`)) markDone(currentId);
            document.getElementById('home-page').classList.remove('hidden');
            document.getElementById('reading-page').classList.add('hidden');
        }

        function markDone(id) {
            if(!completedSurahs.includes(id)) {
                completedSurahs.push(id);
                localStorage.setItem('al7ebi_quran_done', JSON.stringify(completedSurahs));
                init();
            }
        }

        function resetAll() {
            if(confirm("مسح الإنجاز؟")) { completedSurahs = []; localStorage.clear(); init(); }
        }

        init();
    </script>
</body>
</html>
