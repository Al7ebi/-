<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مصحف الحبي V3.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f8faff; -webkit-tap-highlight-color: transparent; }
        .quran-text { font-family: 'Amiri', serif; line-height: 3.2; text-align: justify; text-align-last: center; }
        .bismillah { font-family: 'Amiri', serif; font-size: 2.8em; color: #1e1b4b; text-align: center; margin: 30px 0; border-bottom: 1px double #e2e8f0; padding-bottom: 15px; }
        
        /* تقسيمات الأجزاء والأحزاب */
        .juz-divider { display: block; width: 100%; text-align: center; background: #eef2ff; border: 2px solid #e0e7ff; color: #1e40af; padding: 25px; margin: 45px 0 25px 0; border-radius: 20px; font-weight: 900; font-size: 1.5em; clear: both; }
        .hizb-badge { display: inline-flex; align-items: center; background: #fef08a; color: #854d0e; padding: 4px 16px; border-radius: 12px; font-size: 14px; font-weight: 800; margin: 15px 5px; border: 1px solid #facc15; }

        .surah-card.completed { background-color: #ecfdf5 !important; border-color: #10b981 !important; }
        .check-mark { display: none; position: absolute; top: 5px; right: 8px; color: #10b981; font-size: 14px; }
        .surah-card.completed .check-mark { display: block; }
        .hidden { display: none; }
        .ayah-num { color: #10b981; font-weight: bold; margin: 0 10px; font-family: 'Amiri', serif; font-size: 1.3em; }
        
        .nav-btn { background: white; border-radius: 1.5rem; border: 1px solid #f1f5f9; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="text-slate-900">

    <!-- الرئيسية -->
    <div id="home-page" class="max-w-2xl mx-auto p-4 pb-24">
        <header class="text-center pt-16 pb-12">
            <h1 class="text-7xl font-black text-indigo-950 mb-6 tracking-tighter">القرآن الكريم</h1>
            <p class="text-xl text-slate-500 font-medium">مصحف الحبي - إصدار 2026</p>
        </header>

        <div class="mb-10 px-2">
            <div class="bg-white rounded-3xl flex items-center p-2 border border-slate-200 shadow-sm">
                <input type="text" id="surah-search" placeholder="ابحث عن سورة..." 
                       class="w-full p-4 outline-none text-lg bg-transparent font-bold text-slate-700" oninput="filterSurahs()">
                <div class="bg-indigo-600 text-white p-4 rounded-2xl">🔍</div>
            </div>
        </div>

        <div id="surah-grid" class="grid grid-cols-3 gap-3 px-1"></div>
    </div>

    <!-- القراءة -->
    <div id="reading-page" class="max-w-4xl mx-auto hidden bg-white min-h-screen flex flex-col shadow-2xl">
        <div class="sticky top-0 bg-white/95 backdrop-blur z-30 p-5 flex justify-between items-center border-b">
            <button onclick="confirmExit()" class="text-indigo-600 font-black text-lg">🔙 القائمة</button>
            <h2 id="header-title" class="text-2xl font-black text-indigo-950"></h2>
            <div class="flex items-center gap-3 bg-slate-50 p-2 rounded-2xl border">
                <button onclick="changeFontSize(-2)" class="w-8 h-8 bg-white border rounded-lg font-bold shadow-sm">-</button>
                <span id="font-size-display" class="font-bold text-indigo-600 min-w-[25px] text-center">32</span>
                <button onclick="changeFontSize(2)" class="w-8 h-8 bg-white border rounded-lg font-bold shadow-sm">+</button>
            </div>
        </div>

        <div id="surah-container" class="flex-1 p-8">
            <div id="bismillah-area" class="bismillah">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</div>
            <div id="surah-content" class="quran-text text-slate-800"></div>
        </div>

        <div class="sticky bottom-0 bg-white border-t p-4 flex items-center justify-between gap-3 pb-8 px-6">
            <button id="prev-btn" onclick="askBeforeNavigate(-1)" class="nav-btn flex-1 p-4 text-center">
                <span id="prev-name" class="font-black text-[#5e66f1] text-lg"></span>
            </button>
            <button onclick="resetAll()" class="w-14 h-14 bg-red-50 text-red-400 rounded-2xl flex items-center justify-center border border-red-100 active:scale-90">🗑️</button>
            <button id="next-btn" onclick="askBeforeNavigate(1)" class="nav-btn flex-1 p-4 text-center">
                <span id="next-name" class="font-black text-[#5e66f1] text-lg"></span>
            </button>
        </div>
    </div>

    <script>
        const allSurahs = [{id:1, name:"الفاتحة"}, {id:2, name:"البقرة"}, {id:3, name:"آل عمران"}, {id:18, name:"الكهف"}, {id:78, name:"النبأ"}, {id:114, name:"الناس"}]; // مثال، يمكنك استكمال الباقي

        // قاعدة بيانات كاملة لسورة البقرة
        const baqarahData = {
            26:  { hizb: "ربع الحزب ١" },
            44:  { hizb: "نصف الحزب ١" },
            60:  { hizb: "ثلاثة أرباع الحزب ١" },
            75:  { hizb: "الحزب ٢" },
            92:  { hizb: "ربع الحزب ٢" },
            106: { hizb: "نصف الحزب ٢" },
            124: { hizb: "ثلاثة أرباع الحزب ٢" },
            142: { juz: "الجزء الثاني", hizb: "الحزب ٣" },
            158: { hizb: "ربع الحزب ٣" },
            177: { hizb: "نصف الحزب ٣" },
            189: { hizb: "ثلاثة أرباع الحزب ٣" },
            203: { hizb: "الحزب ٤" },
            219: { hizb: "ربع الحزب ٤" },
            233: { hizb: "نصف الحزب ٤" },
            243: { hizb: "ثلاثة أرباع الحزب ٤" },
            253: { juz: "الجزء الثالث", hizb: "الحزب ٥" },
            272: { hizb: "ربع الحزب ٥" },
            283: { hizb: "نصف الحزب ٥" }
        };

        let completedSurahs = JSON.parse(localStorage.getItem('al7ebi_quran_done')) || [];
        let currentId = null;
        let fontSize = 32;

        function toArabicNum(n) {
            const digits = ['٠', '١', '٢', '٣', '٤', '٥', '٦', '٧', '٨', '٩'];
            return `<span class="ayah-num">﴿${n.toString().split('').map(x => digits[x]).join('')}﴾</span>`;
        }

        async function loadSurah(id) {
            currentId = id;
            document.getElementById('home-page').classList.add('hidden');
            document.getElementById('reading-page').classList.remove('hidden');
            window.scrollTo(0,0);
            
            const bArea = document.getElementById('bismillah-area');
            (id === 1 || id === 9) ? bArea.classList.add('hidden') : bArea.classList.remove('hidden');

            try {
                const res = await fetch(`https://api.alquran.cloud/v1/surah/${id}`);
                const data = await res.json();
                let ayahs = data.data.ayahs;
                document.getElementById('header-title').innerText = `سُورَةُ ${allSurahs.find(s => s.id === id)?.name || ''}`;

                // --- التنظيف الجذري للبسملة المكررة ---
                if (id !== 1 && id !== 9) {
                    const pattern = /^بِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ/g;
                    ayahs[0].text = ayahs[0].text.replace(pattern, "").trim();
                }

                let html = "";
                ayahs.forEach(a => {
                    if (id === 2 && baqarahData[a.numberInSurah]) {
                        const info = baqarahData[a.numberInSurah];
                        if (info.juz) html += `<div class="juz-divider">${info.juz}</div>`;
                        if (info.hizb) html += `<div class="w-full"><span class="hizb-badge">${info.hizb}</span></div>`;
                    }
                    html += `${a.text} ${toArabicNum(a.numberInSurah)} `;
                });

                document.getElementById('surah-content').innerHTML = html;
                document.getElementById('surah-content').style.fontSize = fontSize + 'px';
                updateNav(id);
            } catch (e) { console.error(e); }
        }

        function init() {
            const grid = document.getElementById('surah-grid');
            grid.innerHTML = allSurahs.map(s => `
                <button onclick="loadSurah(${s.id})" class="surah-card relative ${completedSurahs.includes(s.id) ? 'completed' : ''} bg-white p-5 rounded-2xl border border-slate-100 shadow-sm text-center">
                    <span class="check-mark">✅</span>
                    <span class="surah-name block font-black text-sm text-indigo-950">${s.name}</span>
                </button>
            `).join('');
        }

        function changeFontSize(v) {
            fontSize += v;
            document.getElementById('surah-content').style.fontSize = fontSize + 'px';
            document.getElementById('font-size-display').innerText = fontSize;
        }

        function updateNav(id) {
            const idx = allSurahs.findIndex(s => s.id === id);
            const prev = allSurahs[idx-1], next = allSurahs[idx+1];
            document.getElementById('prev-btn').style.visibility = prev ? "visible" : "hidden";
            if(prev) document.getElementById('prev-name').innerText = "السابقة: " + prev.name;
            document.getElementById('next-btn').style.visibility = next ? "visible" : "hidden";
            if(next) document.getElementById('next-name').innerText = "التالية: " + next.name;
        }

        function askBeforeNavigate(step) {
            const current = allSurahs.find(s => s.id === currentId);
            if(confirm(`هل أتممت سورة ${current.name}؟`)) markDone(currentId);
            const idx = allSurahs.findIndex(s => s.id === currentId);
            if(allSurahs[idx+step]) loadSurah(allSurahs[idx+step].id);
        }

        function confirmExit() {
            const current = allSurahs.find(s => s.id === currentId);
            if(confirm(`هل أتممت سورة ${current.name}؟`)) markDone(currentId);
            document.getElementById('home-page').classList.remove('hidden');
            document.getElementById('reading-page').classList.add('hidden');
        }

        function markDone(id) {
            if(!completedSurahs.includes(id)) {
                completedSurahs.push(id);
                localStorage.setItem('al7ebi_quran_done', JSON.stringify(completedSurahs));
                init();
            }
        }

        function resetAll() {
            if(confirm("تصفير الإنجاز؟")) {
                completedSurahs = [];
                localStorage.removeItem('al7ebi_quran_done');
                init();
                document.getElementById('home-page').classList.remove('hidden');
                document.getElementById('reading-page').classList.add('hidden');
            }
        }

        init();
    </script>
</body>
</html>
