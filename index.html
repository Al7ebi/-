<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مصحف التتبع الاحترافي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f8fafc; }
        .quran-text { font-family: 'Amiri', serif; line-height: 2.5; word-spacing: 4px; }
        .bismillah { font-family: 'Amiri', serif; font-size: 1.6em; color: #1e1b4b; margin-bottom: 25px; display: block; border-bottom: 2px double #e5e7eb; padding-bottom: 15px; }
        .surah-card.completed { background-color: #ecfdf5; border-color: #10b981; }
        .surah-card.completed .surah-name { color: #065f46; }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-slate-50">

    <!-- الصفحة الرئيسية -->
    <div id="home-page" class="max-w-2xl mx-auto p-4 pb-20">
        <header class="text-center py-10">
            <h1 class="text-4xl font-bold text-slate-900">المصحف الكريم</h1>
            <p class="text-slate-500 mt-2">اضغط على السورة للبدء بالتلاوة</p>
            <button onclick="resetAll()" class="mt-4 text-xs text-red-500 border border-red-200 px-4 py-1 rounded-full bg-white shadow-sm">إعادة ضبط جميع العلامات 🔄</button>
        </header>

        <div id="surah-grid" class="grid grid-cols-2 sm:grid-cols-3 gap-4">
            <!-- سيتم توليد السور هنا -->
        </div>
    </div>

    <!-- صفحة القراءة -->
    <div id="reading-page" class="max-w-3xl mx-auto hidden bg-white min-h-screen flex flex-col shadow-2xl">
        <!-- الترويسة الثابتة -->
        <div class="sticky top-0 bg-white/95 backdrop-blur shadow-sm z-30 p-4 flex justify-between items-center border-b">
            <button onclick="confirmExit()" class="text-slate-600 font-bold flex items-center gap-1">🔙 خروج</button>
            <h2 id="header-title" class="text-2xl font-bold text-indigo-900 Amiri">سورة</h2>
            <div class="flex gap-2">
                <button onclick="changeFontSize(2)" class="w-10 h-10 bg-slate-100 rounded-full font-bold shadow-sm">+</button>
                <button onclick="changeFontSize(-2)" class="w-10 h-10 bg-slate-100 rounded-full font-bold shadow-sm">-</button>
            </div>
        </div>

        <!-- محتوى السورة -->
        <div id="surah-container" class="flex-1 p-6 md:p-12 text-center overflow-y-auto">
            <div id="bismillah-area" class="bismillah">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>
            <div id="surah-content" class="quran-text text-3xl text-slate-800"></div>
        </div>

        <!-- شريط التنقل السفلي -->
        <div class="sticky bottom-0 bg-slate-50 border-t p-4 pb-10 grid grid-cols-2 gap-4">
            <button id="prev-btn" onclick="askBeforeNavigate(-1)" class="bg-white border rounded-2xl p-4 shadow-sm hover:bg-indigo-50 transition">
                <span class="block text-[10px] text-slate-400">السورة السابقة</span>
                <span id="prev-name" class="font-bold text-indigo-700"></span>
            </button>
            
            <button id="next-btn" onclick="askBeforeNavigate(1)" class="bg-white border rounded-2xl p-4 shadow-sm hover:bg-indigo-50 transition">
                <span class="block text-[10px] text-slate-400">السورة التالية</span>
                <span id="next-name" class="font-bold text-indigo-700"></span>
            </button>
        </div>
    </div>

    <script>
        const allSurahs = [
            {id:1, name:"الفاتحة"}, {id:2, name:"البقرة"}, {id:18, name:"الكهف"},
            {id:78, name:"النبأ"}, {id:79, name:"النازعات"}, {id:80, name:"عبس"}, {id:81, name:"التكوير"},
            {id:82, name:"الإنفطار"}, {id:83, name:"المطففين"}, {id:84, name:"الانشقاق"}, {id:85, name:"البروج"},
            {id:86, name:"الطارق"}, {id:87, name:"الأعلى"}, {id:88, name:"الغاشية"}, {id:89, name:"الفجر"},
            {id:90, name:"البلد"}, {id:91, name:"الشمس"}, {id:92, name:"الليل"}, {id:93, name:"الضحى"},
            {id:94, name:"الشرح"}, {id:95, name:"التين"}, {id:96, name:"العلق"}, {id:97, name:"القدر"},
            {id:98, name:"البينة"}, {id:99, name:"الزلزلة"}, {id:100, name:"العاديات"}, {id:101, name:"القارعة"},
            {id:102, name:"التكاثر"}, {id:103, name:"العصر"}, {id:104, name:"الهمزة"}, {id:105, name:"الفيل"},
            {id:106, name:"قريش"}, {id:107, name:"الماعون"}, {id:108, name:"الكوثر"}, {id:109, name:"الكافرون"},
            {id:110, name:"النصر"}, {id:111, name:"المسد"}, {id:112, name:"الإخلاص"}, {id:113, name:"الفلق"}, {id:114, name:"الناس"}
        ];

        let progress = JSON.parse(localStorage.getItem('quran_progress_v3')) || {};
        let currentId = null;
        let fontSize = 32;

        function init() {
            const grid = document.getElementById('surah-grid');
            grid.innerHTML = allSurahs.map(s => {
                const isDone = progress[s.id] ? 'completed' : '';
                const count = progress[s.id] || 0;
                return `
                    <button id="card-${s.id}" onclick="loadSurah(${s.id})" class="surah-card ${isDone} bg-white p-5 rounded-3xl border shadow-sm transition active:scale-95 text-center relative overflow-hidden">
                        ${count > 0 ? `<span class="absolute top-0 right-0 bg-green-500 text-white text-[10px] px-2 py-1 rounded-bl-xl">تم ${count}</span>` : ''}
                        <span class="surah-name block font-bold text-lg text-slate-700">${s.name}</span>
                        <span class="text-[10px] text-slate-400">#${s.id}</span>
                    </button>
                `;
            }).join('');
        }

        async function loadSurah(id) {
            currentId = id;
            document.getElementById('home-page').classList.add('hidden');
            document.getElementById('reading-page').classList.remove('hidden');
            window.scrollTo(0,0);
            
            try {
                const res = await fetch(`https://api.alquran.cloud/v1/surah/${id}`);
                const data = await res.json();
                const surah = data.data;
                const info = allSurahs.find(s => s.id === id);

                document.getElementById('header-title').innerText = `سُورَةُ ${info.name}`;
                
                // معالجة البسملة الفردية
                const bismillahArea = document.getElementById('bismillah-area');
                if (id === 1 || id === 9) {
                    bismillahArea.classList.add('hidden');
                } else {
                    bismillahArea.classList.remove('hidden');
                }

                // تنظيف النص لضمان عدم ظهور البسملة مرتين
                let ayahs = surah.ayahs;
                const bismillahText = "بِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ";
                
                if (id !== 1 && id !== 9 && ayahs[0].text.startsWith(bismillahText)) {
                    ayahs[0].text = ayahs[0].text.replace(bismillahText, "").trim();
                }

                document.getElementById('surah-content').innerHTML = ayahs.map(a => 
                    `${a.text} <span class="text-indigo-400 font-sans text-xl mx-1 italic">﴿${a.numberInSurah}﴾</span>`
                ).join(' ');

                updateNav(id);
            } catch (e) { alert("خطأ في التحميل"); }
        }

        function updateNav(id) {
            const idx = allSurahs.findIndex(s => s.id === id);
            const prev = allSurahs[idx-1];
            const next = allSurahs[idx+1];
            
            document.getElementById('prev-btn').style.opacity = prev ? "1" : "0.3";
            document.getElementById('prev-name').innerText = prev ? prev.name : "بداية المصحف";
            
            document.getElementById('next-btn').style.opacity = next ? "1" : "0.3";
            document.getElementById('next-name').innerText = next ? next.name : "نهاية المصحف";
        }

        function askBeforeNavigate(step) {
            const idx = allSurahs.findIndex(s => s.id === currentId);
            const target = allSurahs[idx + step];
            
            if(!target) return;

            if(confirm(`هل أكملت قراءة سورة ${allSurahs[idx].name}؟`)) {
                markAsDone(currentId);
                loadSurah(target.id);
            } else {
                loadSurah(target.id);
            }
        }

        function confirmExit() {
            const info = allSurahs.find(s => s.id === currentId);
            if(confirm(`هل تود الخروج؟ هل أكملت سورة ${info.name}؟`)) {
                markAsDone(currentId);
            }
            goHome();
        }

        function markAsDone(id) {
            progress[id] = (progress[id] || 0) + 1;
            localStorage.setItem('quran_progress_v3', JSON.stringify(progress));
            init(); // تحديث الألوان في الصفحة الرئيسية
        }

        function goHome() {
            document.getElementById('home-page').classList.remove('hidden');
            document.getElementById('reading-page').classList.add('hidden');
        }

        function changeFontSize(v) {
            fontSize += v;
            document.getElementById('surah-content').style.fontSize = fontSize + 'px';
        }

        function resetAll() {
            if(confirm("سيتم مسح جميع علامات الإنجاز والألوان، هل أنت متأكد؟")) {
                progress = {};
                localStorage.clear();
                init();
            }
        }

        init();
    </script>
</body>
</html>
