<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>مصحف الحبي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f8faff; }
        .quran-text { font-family: 'Amiri', serif; line-height: 2.8; text-align: justify; text-align-last: center; }
        .ayah-num { color: #10b981; font-weight: bold; margin: 0 4px; font-size: 1.1em; }
        .bismillah { font-family: 'Amiri', serif; font-size: 2.5em; color: #1e1b4b; text-align: center; margin-bottom: 20px; }
        .search-container { background: white; border-radius: 999px; display: flex; align-items: center; padding: 4px; border: 1px solid #e2e8f0; }
        .search-icon { background: #4f46e5; color: white; padding: 10px; border-radius: 999px; margin-left: 8px; }
    </style>
</head>
<body class="text-slate-900">

<!-- الرئيسية -->
<div id="home-page" class="max-w-2xl mx-auto p-4 pb-24">
    <header class="text-center pt-12 pb-8">
        <h1 class="text-6xl font-black text-indigo-950 mb-2">القرآن الكريم</h1>
        <p class="text-xl text-slate-500">مصحف الحبي</p>
    </header>

    <div class="mb-8 px-2">
        <div class="search-container shadow-sm">
            <div class="search-icon">🔍</div>
            <input id="search" type="text" placeholder="ابحث عن سورة..." class="flex-1 outline-none text-lg bg-transparent p-2" oninput="filterSurahs()">
        </div>
    </div>

    <div id="surah-grid" class="grid grid-cols-3 gap-3"></div>
</div>

<!-- القراءة -->
<div id="reading-page" class="hidden fixed inset-0 bg-white flex flex-col z-50">
    <div class="sticky top-0 bg-white/95 backdrop-blur shadow-sm p-4 flex justify-between items-center border-b">
        <button onclick="exitReader()" class="text-indigo-600 font-black text-xl">🔙 خروج</button>
        <h2 id="surah-title" class="text-2xl font-black text-indigo-950"></h2>
        <div class="flex items-center gap-2 bg-slate-50 p-1 rounded-lg border">
            <button onclick="changeFont(-2)" class="w-8 h-8 bg-white border rounded font-bold">-</button>
            <button onclick="changeFont(2)" class="w-8 h-8 bg-white border rounded font-bold">+</button>
        </div>
    </div>

    <div class="p-6 overflow-y-auto flex-1">
        <div id="basmala" class="bismillah hidden">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</div>
        <div id="ayahs" class="quran-text text-slate-800"></div>
    </div>

    <div class="bg-white border-t p-4 flex justify-between gap-3 shadow-lg">
        <button onclick="prevSurah()" class="flex-1 p-3 bg-slate-100 rounded-xl font-bold text-indigo-600 border">السابق</button>
        <button onclick="resetCurrentSurah()" class="w-14 h-14 flex items-center justify-center bg-red-50 rounded-xl text-red-500 border border-red-100 shadow-sm">🗑️</button>
        <button onclick="nextSurah()" class="flex-1 p-3 bg-indigo-600 rounded-xl font-bold text-white shadow-md">التالي</button>
    </div>
</div>

<script>
let allSurahs = [], filteredSurahs = [], currentSurah = null, fontSize = 32;
const allowedSurahs = [1, 2, 18];

// البداية
fetch('https://api.alquran.cloud/v1/surah')
    .then(res => res.json())
    .then(data => {
        allSurahs = data.data.filter(s => allowedSurahs.includes(s.number) || s.number >= 78);
        filteredSurahs = allSurahs;
        renderSurahs(filteredSurahs);
    });

function toArabicNum(n) {
    const d = ['٠','١','٢','٣','٤','٥','٦','٧','٨','٩'];
    return `<span class="ayah-num">﴿${n.toString().split('').map(x => d[x]).join('')}﴾</span>`;
}

function renderSurahs(list) {
    const grid = document.getElementById('surah-grid');
    const completed = JSON.parse(localStorage.getItem('completedSurahs') || '[]');
    grid.innerHTML = list.map(s => `
        <div onclick="loadSurah(${s.number})" class="relative bg-white p-5 rounded-2xl border shadow-sm text-center cursor-pointer active:scale-95 transition-all ${completed.includes(s.number) ? 'bg-emerald-50 border-emerald-200' : ''}">
            ${completed.includes(s.number) ? '<span class="absolute top-2 right-2 text-xs">✅</span>' : ''}
            <div class="font-black text-indigo-950">${s.name}</div>
        </div>
    `).join('');
}

function filterSurahs() {
    const val = document.getElementById('search').value.trim();
    filteredSurahs = allSurahs.filter(s => s.name.includes(val));
    renderSurahs(filteredSurahs);
}

function loadSurah(id) {
    fetch(`https://api.alquran.cloud/v1/surah/${id}`)
        .then(res => res.json())
        .then(data => {
            currentSurah = id;
            let ayahs = data.data.ayahs;
            const basmala = document.getElementById('basmala');
            
            // تنظيف البسملة المكررة نهائياً باستخدام Regex
            if (id !== 1 && id !== 9) {
                basmala.classList.remove('hidden');
                const pattern = /^بِسْمِ\s*ٱللَّهِ\s*ٱلرَّحْمَٰنِ\s*ٱلرَّحِيمِ/g;
                ayahs[0].text = ayahs[0].text.replace(pattern, "").trim();
            } else {
                basmala.classList.add('hidden');
            }

            document.getElementById('surah-title').innerText = data.data.name;
            document.getElementById('ayahs').innerHTML = ayahs.map(a => `${a.text} ${toArabicNum(a.numberInSurah)}`).join(' ');
            document.getElementById('ayahs').style.fontSize = fontSize + 'px';
            
            document.getElementById('home-page').classList.add('hidden');
            document.getElementById('reading-page').classList.remove('hidden');
        });
}

function changeFont(v) {
    fontSize = Math.max(20, fontSize + v);
    document.getElementById('ayahs').style.fontSize = fontSize + 'px';
}

function exitReader() {
    let completed = JSON.parse(localStorage.getItem('completedSurahs') || '[]');
    if (!completed.includes(currentSurah)) completed.push(currentSurah);
    localStorage.setItem('completedSurahs', JSON.stringify(completed));
    location.reload(); // تحديث لضمان ظهور العلامة الخضراء
}

function resetCurrentSurah() {
    if(confirm("هل تريد حذف إنجاز هذه السورة فقط؟")) {
        let completed = JSON.parse(localStorage.getItem('completedSurahs') || '[]');
        completed = completed.filter(id => id !== currentSurah);
        localStorage.setItem('completedSurahs', JSON.stringify(completed));
        location.reload();
    }
}

function nextSurah() {
    const idx = allSurahs.findIndex(s => s.number === currentSurah);
    if (idx < allSurahs.length - 1) loadSurah(allSurahs[idx + 1].number);
}

function prevSurah() {
    const idx = allSurahs.findIndex(s => s.number === currentSurah);
    if (idx > 0) loadSurah(allSurahs[idx - 1].number);
}
</script>
</body>
</html>
