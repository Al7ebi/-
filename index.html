<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مصحف الحبي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f8faff; -webkit-tap-highlight-color: transparent; }
        .quran-text { font-family: 'Amiri', serif; line-height: 3; text-align: justify; text-align-last: center; }
        .bismillah { font-family: 'Amiri', serif; font-size: 2.5em; color: #1e1b4b; text-align: center; margin: 30px 0; border-bottom: 1px double #e2e8f0; padding-bottom: 15px; }
        
        /* وسوم الأجزاء والأحزاب */
        .juz-divider { display: block; width: 100%; text-align: center; background: #f0f4ff; border: 1px solid #dce4ff; color: #1e1b4b; padding: 15px; margin: 40px 0 20px 0; border-radius: 15px; font-weight: 900; font-size: 1.2em; clear: both; }
        .hizb-badge { display: inline-flex; align-items: center; background: #facc15; color: #422006; padding: 2px 12px; border-radius: 999px; font-size: 12px; font-weight: 800; margin-left: 8px; vertical-align: middle; border: 1px solid #eab308; }

        .surah-card.completed { background-color: #ecfdf5 !important; border-color: #10b981 !important; }
        .check-mark { display: none; position: absolute; top: 5px; right: 8px; color: #10b981; font-size: 14px; }
        .surah-card.completed .check-mark { display: block; }
        .hidden { display: none; }
        .ayah-num { color: #10b981; font-weight: bold; margin: 0 6px; font-family: 'Amiri', serif; font-size: 1.2em; }
        
        .nav-btn { background: white; border-radius: 1.5rem; border: 1px solid #f1f5f9; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); transition: all 0.2s; }
        .nav-btn:active { scale: 0.95; }
    </style>
</head>
<body class="text-slate-900">

    <!-- الصفحة الرئيسية -->
    <div id="home-page" class="max-w-2xl mx-auto p-4 pb-24">
        <header class="text-center pt-16 pb-12">
            <h1 class="text-7xl font-black text-indigo-950 mb-6 tracking-tighter">القرآن الكريم</h1>
            <p class="text-xl text-slate-500 font-medium">مصحف الحبي التعليمي - رواية حفص</p>
        </header>

        <div class="mb-10 px-2">
            <div class="bg-white rounded-3xl flex items-center p-2 border border-slate-100 shadow-sm">
                <input type="text" id="surah-search" placeholder="ابحث عن سورة..." 
                       class="w-full p-4 outline-none text-lg bg-transparent font-bold text-slate-700" oninput="filterSurahs()">
                <div class="bg-indigo-600 text-white p-4 rounded-2xl">🔍</div>
            </div>
        </div>

        <div id="surah-grid" class="grid grid-cols-3 gap-3 px-1"></div>
    </div>

    <!-- صفحة القراءة -->
    <div id="reading-page" class="max-w-3xl mx-auto hidden bg-white min-h-screen flex flex-col shadow-2xl">
        <div class="sticky top-0 bg-white/95 backdrop-blur z-30 p-5 flex justify-between items-center border-b">
            <button onclick="confirmExit()" class="text-indigo-600 font-black text-lg">🔙 القائمة</button>
            <h2 id="header-title" class="text-2xl font-black text-indigo-950"></h2>
            <div class="flex gap-2">
                <button onclick="changeFontSize(-2)" class="w-10 h-10 bg-slate-100 rounded-xl font-bold">-</button>
                <button onclick="changeFontSize(2)" class="w-10 h-10 bg-slate-100 rounded-xl font-bold">+</button>
            </div>
        </div>

        <div id="surah-container" class="flex-1 p-8">
            <div id="bismillah-area" class="bismillah">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</div>
            <div id="surah-content" class="quran-text text-slate-800"></div>
        </div>

        <!-- أزرار التنقل السفلية -->
        <div class="sticky bottom-0 bg-white border-t p-4 flex items-center justify-between gap-3 pb-8 px-6">
            <button id="prev-btn" onclick="askBeforeNavigate(-1)" class="nav-btn flex-1 p-4 text-center">
                <span class="block text-[10px] text-slate-400 font-bold mb-1 uppercase">السابقة</span>
                <span id="prev-name" class="font-black text-[#5e66f1] text-lg"></span>
            </button>

            <button onclick="resetAll()" class="w-14 h-14 bg-red-50 text-red-300 rounded-2xl flex items-center justify-center border border-red-100 shadow-sm active:scale-90">
                🗑️
            </button>

            <button id="next-btn" onclick="askBeforeNavigate(1)" class="nav-btn flex-1 p-4 text-center">
                <span class="block text-[10px] text-slate-400 font-bold mb-1 uppercase">التالية</span>
                <span id="next-name" class="font-black text-[#5e66f1] text-lg"></span>
            </button>
        </div>
    </div>

    <script>
        const allSurahs = [
            {id:1, name:"الفاتحة"}, {id:2, name:"البقرة"}, {id:18, name:"الكهف"},
            {id:78, name:"النبأ"}, {id:79, name:"النازعات"}, {id:80, name:"عبس"}, {id:81, name:"التكوير"},
            {id:82, name:"الإنفطار"}, {id:83, name:"المطففين"}, {id:84, name:"الانشقاق"}, {id:85, name:"البروج"},
            {id:86, name:"الطارق"}, {id:87, name:"الأعلى"}, {id:88, name:"الغاشية"}, {id:89, name:"الفجر"},
            {id:90, name:"البلد"}, {id:91, name:"الشمس"}, {id:92, name:"الليل"}, {id:93, name:"الضحى"},
            {id:94, name:"الشرح"}, {id:95, name:"التين"}, {id:96, name:"العلق"}, {id:97, name:"القدر"},
            {id:98, name:"البينة"}, {id:99, name:"الزلزلة"}, {id:100, name:"العاديات"}, {id:101, name:"القارعة"},
            {id:102, name:"التكاثر"}, {id:103, name:"العصر"}, {id:104, name:"الهمزة"}, {id:105, name:"الفيل"},
            {id:106, name:"قريش"}, {id:107, name:"الماعون"}, {id:108, name:"الكوثر"}, {id:109, name:"الكافرون"},
            {id:110, name:"النصر"}, {id:111, name:"المسد"}, {id:112, name:"الإخلاص"}, {id:113, name:"الفلق"}, {id:114, name:"الناس"}
        ];

        // بيانات أجزاء وأحزاب سورة البقرة فقط
        const baqarahStructure = {
            142: { juz: 2, label: "الجزء الثاني" },
            253: { juz: 3, label: "الجزء الثالث" },
            26:  { hizb: "ربع الحزب ١" },
            44:  { hizb: "نصف الحزب ١" },
            60:  { hizb: "ثلاثة أرباع الحزب ١" },
            75:  { hizb: "الحزب ٢" }
        };

        let completedSurahs = JSON.parse(localStorage.getItem('al7ebi_quran_done')) || [];
        let currentId = null;
        let fontSize = 32;

        function toArabicNum(n) {
            const farsiDigits = ['٠', '١', '٢', '٣', '٤', '٥', '٦', '٧', '٨', '٩'];
            return `<span class="ayah-num">﴿${n.toString().split('').map(x => farsiDigits[x]).join('')}﴾</span>`;
        }

        function init(filter = "") {
            const grid = document.getElementById('surah-grid');
            const filtered = allSurahs.filter(s => s.name.includes(filter));
            grid.innerHTML = filtered.map(s => `
                <button onclick="loadSurah(${s.id})" class="surah-card relative ${completedSurahs.includes(s.id) ? 'completed' : ''} bg-white p-5 rounded-2xl border border-slate-100 shadow-sm text-center">
                    <span class="check-mark">✅</span>
                    <span class="surah-name block font-black text-sm text-indigo-950">${s.name}</span>
                </button>
            `).join('');
        }

        async function loadSurah(id) {
            currentId = id;
            document.getElementById('home-page').classList.add('hidden');
            document.getElementById('reading-page').classList.remove('hidden');
            window.scrollTo(0,0);
            
            const bismillahArea = document.getElementById('bismillah-area');
            // إخفاء البسملة الخارجية في الفاتحة والتوبة
            if (id === 1 || id === 9) bismillahArea.classList.add('hidden');
            else bismillahArea.classList.remove('hidden');

            try {
                const res = await fetch(`https://api.alquran.cloud/v1/surah/${id}`);
                const data = await res.json();
                let ayahs = data.data.ayahs;
                document.getElementById('header-title').innerText = `سُورَةُ ${allSurahs.find(s => s.id === id).name}`;

                // حذف البسملة المكررة من أول آية
                if (id !== 1 && id !== 9) {
                    const bismillahPattern = "بِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ";
                    if (ayahs[0].text.includes(bismillahPattern)) {
                        ayahs[0].text = ayahs[0].text.replace(bismillahPattern, "").trim();
                    }
                }

                let finalHTML = "";
                ayahs.forEach(a => {
                    // معالجة تقسيمات سورة البقرة
                    if (id === 2) {
                        if (baqarahStructure[a.numberInSurah]) {
                            const struct = baqarahStructure[a.numberInSurah];
                            if (struct.juz) finalHTML += `<div class="juz-divider">${struct.label}</div>`;
                            if (struct.hizb) finalHTML += `<span class="hizb-badge">${struct.hizb}</span>`;
                        }
                    }
                    finalHTML += `${a.text} ${toArabicNum(a.numberInSurah)} `;
                });

                const contentDiv = document.getElementById('surah-content');
                contentDiv.style.fontSize = fontSize + 'px';
                contentDiv.innerHTML = finalHTML;
                updateNav(id);
            } catch (e) { console.error(e); }
        }

        function filterSurahs() {
            init(document.getElementById('surah-search').value);
        }

        function changeFontSize(v) {
            fontSize += v;
            document.getElementById('surah-content').style.fontSize = fontSize + 'px';
        }

        function updateNav(id) {
            const idx = allSurahs.findIndex(s => s.id === id);
            const prev = allSurahs[idx-1];
            const next = allSurahs[idx+1];
            document.getElementById('prev-btn').style.visibility = prev ? "visible" : "hidden";
            if(prev) document.getElementById('prev-name').innerText = prev.name;
            document.getElementById('next-btn').style.visibility = next ? "visible" : "hidden";
            if(next) document.getElementById('next-name').innerText = next.name;
        }

        function askBeforeNavigate(step) {
            const idx = allSurahs.findIndex(s => s.id === currentId);
            if(confirm(`هل أكملت قراءة سورة ${allSurahs[idx].name}؟`)) markDone(currentId);
            const target = allSurahs[idx + step];
            if(target) loadSurah(target.id);
        }

        function confirmExit() {
            const info = allSurahs.find(s => s.id === currentId);
            if(confirm(`هل أكملت سورة ${info.name}؟`)) markDone(currentId);
            document.getElementById('home-page').classList.remove('hidden');
            document.getElementById('reading-page').classList.add('hidden');
        }

        function markDone(id) {
            if(!completedSurahs.includes(id)) {
                completedSurahs.push(id);
                localStorage.setItem('al7ebi_quran_done', JSON.stringify(completedSurahs));
                init();
            }
        }

        function resetAll() {
            if(confirm("تصفير جميع الإنجازات؟")) {
                completedSurahs = [];
                localStorage.removeItem('al7ebi_quran_done');
                init();
                document.getElementById('home-page').classList.remove('hidden');
                document.getElementById('reading-page').classList.add('hidden');
            }
        }

        init();
    </script>
</body>
</html>
